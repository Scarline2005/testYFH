[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/healthz"
  to = "/.netlify/functions/healthz"
  status = 200
  force = true

[[redirects]]
  from = "/api/health/email"
  to = "/.netlify/functions/health-email"
  status = 200
  force = true

[[redirects]]
  from = "/api/diagnostics/email"
  to = "/.netlify/functions/health-email"
  status = 200
  force = true

[[redirects]]
  from = "/api/diagnostics/dns"
  to = "/.netlify/functions/dns-diagnose"
  status = 200
  force = true
